name: Refresh README assets

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch: {}
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create assets folder
        run: mkdir -p assets

      # --- Generated directly by GitHub Actions (no public website involved) ---
      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&hide_border=true&theme=tokyonight&include_all_commits=true&count_private=true&show=prs_merged,prs_merged_percentage
          path: assets/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&hide_border=true&theme=tokyonight
          path: assets/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate streak card
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: user=${{ github.repository_owner }}&theme=tokyonight&hide_border=true
          path: assets/streak.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # --- Everything below still comes from live third-party endpoints,       ---
      # --- which have been working fine, so left as simple curl fetches       ---
      - name: Fetch activity graph
        run: curl -sL --retry 3 --max-time 25 -o assets/activity-graph.svg "https://github-readme-activity-graph.vercel.app/graph?username=${{ github.repository_owner }}&theme=tokyo-night&hide_border=true&area=true"

      - name: Fetch PR/contribution summary card
        run: curl -sL --retry 3 --max-time 25 -o assets/pr-stats.svg "https://github-profile-summary-cards.vercel.app/api/cards/stats?username=${{ github.repository_owner }}&theme=github_dark"

      - name: Fetch profile details card
        run: curl -sL --retry 3 --max-time 25 -o assets/profile-details.svg "https://github-profile-summary-cards.vercel.app/api/cards/profile-details?username=${{ github.repository_owner }}&theme=github_dark"

      - name: Fetch dev quote card
        run: curl -sL --retry 3 --max-time 25 -o assets/quote.svg "https://quotes-github-readme.vercel.app/api?type=horizontal&theme=tokyonight"

      - name: Fetch top contributed repo card
        run: curl -sL --retry 3 --max-time 25 -o assets/top-contributed-repo.svg "https://github-contributor-stats.vercel.app/api?username=${{ github.repository_owner }}&limit=5&theme=tokyonight&combine_all_yearly_contributions=true"

      - name: Fetch trophies card
        run: curl -sL --retry 3 --max-time 25 -o assets/trophies.svg "https://github-profile-trophy.vercel.app/?username=${{ github.repository_owner }}&theme=tokyonight&no-frame=true&margin-w=4&row=1"

      - name: Drop any empty/failed curl downloads
        run: find assets -maxdepth 1 -name "*.svg" -size -200c -delete

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "chore: refresh README stat assets"
          git push
