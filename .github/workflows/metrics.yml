name: Generate profile metrics

on:
  schedule:
    - cron: "0 */12 * * *"   # twice a day
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create assets folder
        run: mkdir -p assets

      # Main card — header, recent activity, community stats, repo stats
      - name: Generate base metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: assets/metrics-base.svg
          base: "header, activity, community, repositories"
          config_timezone: Asia/Kolkata
          plugin_lines: yes

      # Top languages, weighted by real usage
      - name: Generate languages card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: assets/metrics-languages.svg
          base: ""
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_recent_categories: markup, programming
          plugin_languages_details: bytes-size, percentage

      # Isometric 3D-style contribution calendar — the unique animated centerpiece
      - name: Generate isometric contribution calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: assets/metrics-isocalendar.svg
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      # Achievement badges — a more polished, actively-maintained alternative to trophies
      - name: Generate achievements card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: assets/metrics-achievements.svg
          base: ""
          plugin_achievements: yes
          plugin_achievements_display: detailed
          plugin_achievements_secrets: yes
          plugin_achievements_threshold: C

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/metrics-*.svg
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "chore: regenerate profile metrics"
          git pull --rebase origin main
          git push
