name: Generate language constellation

on:
  schedule:
    - cron: "0 6 * * *"   # once a day
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  constellation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create assets folder
        run: mkdir -p assets

      - name: Generate constellation SVG
        run: node scripts/generate-constellation.js
        env:
          USERNAME: ${{ github.repository_owner }}
          METRICS_TOKEN: ${{ secrets.METRICS_TOKEN }}
          OUT_PATH: assets/constellation.svg

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/constellation.svg
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "chore: regenerate language constellation"
          git pull --rebase origin main
          git push
