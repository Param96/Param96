name: Generate custom profile visuals

on:
  schedule:
    - cron: "0 5 * * *"   # once a day
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  visuals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create assets folder
        run: mkdir -p assets

      - name: Generate dashboard
        run: node scripts/generate-dashboard.js
        env:
          USERNAME: ${{ github.repository_owner }}
          METRICS_TOKEN: ${{ secrets.METRICS_TOKEN }}
          OUT_PATH: assets/dashboard.svg

      - name: Generate skyline
        run: node scripts/generate-skyline.js
        env:
          USERNAME: ${{ github.repository_owner }}
          METRICS_TOKEN: ${{ secrets.METRICS_TOKEN }}
          OUT_PATH: assets/skyline.svg

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/dashboard.svg assets/skyline.svg
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "chore: regenerate custom profile visuals"
          git pull --rebase origin main
          git push
